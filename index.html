<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adega O Fluxo</title>
    <style>
        :root { --gold: #D4AF37; --dark: #0a0a0a; --gray: #1a1a1a; --text: #f5f5f5; --green: #25d366; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: var(--dark); color: var(--text); padding-bottom: 150px; }
        header { padding: 30px 20px; text-align: center; border-bottom: 2px solid var(--gold); }
        .container { max-width: 600px; margin: 0 auto; padding: 15px; }
        .card { background: var(--gray); border-radius: 10px; padding: 15px; margin-bottom: 12px; display: flex; align-items: center; }
        .btn-add { background: var(--gold); border: none; padding: 10px 15px; border-radius: 5px; margin-left: auto; }
        .cart-bar { position: fixed; bottom: 0; width: 100%; background: #151515; padding: 20px; display: flex; justify-content: space-between; align-items: center; border-top: 2px solid var(--gold); }
        
        #modalPedido { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); padding: 20px; z-index: 200; overflow-y: auto; }
        .modal-content { max-width: 500px; margin: 50px auto; background: var(--gray); padding: 20px; border-radius: 10px; }
        input, select, textarea { width: 100%; padding: 10px; margin: 8px 0; border-radius: 5px; border: 1px solid #333; background: #000; color: #fff; }
    </style>
</head>
<body>

<header><h1>Adega O Fluxo</h1></header>
<div class="container"><div id="vitrine">Carregando...</div></div>

<div class="cart-bar" id="cart-bar" style="display: none;">
    <div>Total: <span id="cart-total" style="color:var(--gold);">R$ 0,00</span></div>
    <button onclick="abrirModal()" style="background:var(--green); border:none; padding:10px; color:white; border-radius:5px;">Fechar Pedido</button>
</div>

<div id="modalPedido">
    <div class="modal-content">
        <h2 style="color:var(--gold);">Finalizar Pedido</h2>
        <input type="text" id="nomeCliente" placeholder="Nome Completo">
        <input type="text" id="cep" placeholder="CEP (digite para buscar)" onblur="buscarCEP(this.value)">
        <input type="text" id="rua" placeholder="Rua">
        <input type="text" id="num" placeholder="Número">
        <input type="text" id="bairro" placeholder="Bairro">
        <select id="pagamento">
            <option value="Pix">Pix</option>
            <option value="Cartão">Cartão</option>
            <option value="Dinheiro">Dinheiro</option>
        </select>
        <textarea id="obs" placeholder="Observações"></textarea>
        <button onclick="finalizarPedido()" style="width:100%; padding:15px; background:var(--green); border:none; color:white;">Enviar Pedido via WhatsApp</button>
        <button onclick="fecharModal()" style="width:100%; padding:10px; margin-top:10px; background:transparent; color:white;">Cancelar</button>
    </div>
</div>

<script>
    let baseProdutos = [];
    let carrinho = JSON.parse(localStorage.getItem('carrinho_fluxo')) || [];

    async function carregar() {
        const res = await fetch('https://siddneyalmeidaa-ai.github.io/adega-o-fluxo/produtos.json');
        baseProdutos = await res.json();
        let html = '';
        baseProdutos.forEach((p, i) => {
            html += `<div class="card"><div><h3>${p.nome}</h3><p>R$ ${p.preco.toFixed(2)}</p></div><button class="btn-add" onclick="adicionar(${i})">ADD</button></div>`;
        });
        document.getElementById('vitrine').innerHTML = html;
    }

    async function buscarCEP(cep) {
        cep = cep.replace(/\D/g, '');
        if(cep.length === 8) {
            const res = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
            const data = await res.json();
            if(!data.erro) {
                document.getElementById('rua').value = data.logradouro;
                document.getElementById('bairro').value = data.bairro;
            }
        }
    }

    function adicionar(i) { carrinho.push(baseProdutos[i]); localStorage.setItem('carrinho_fluxo', JSON.stringify(carrinho)); recalcular(); }
    function recalcular() {
        const total = carrinho.reduce((a, b) => a + b.preco, 0);
        document.getElementById('cart-total').innerText = `R$ ${total.toFixed(2)}`;
        document.getElementById('cart-bar').style.display = carrinho.length > 0 ? 'flex' : 'none';
    }

    function abrirModal() { document.getElementById('modalPedido').style.display = 'block'; }
    function fecharModal() { document.getElementById('modalPedido').style.display = 'none'; }

    function finalizarPedido() {
        const nome = document.getElementById('nomeCliente').value;
        const rua = document.getElementById('rua').value;
        const num = document.getElementById('num').value;
        const bairro = document.getElementById('bairro').value;
        const pag = document.getElementById('pagamento').value;
        
        let msg = `*NOVO PEDIDO*\nNome: ${nome}\nEnd: ${rua}, ${num} - ${bairro}\nPagamento: ${pag}\n\nItens:\n`;
        carrinho.forEach(item => msg += `• ${item.nome}\n`);
        
        window.open(`https://api.whatsapp.com/send?phone=5511942971753&text=${encodeURIComponent(msg)}`, '_blank');
    }

    window.onload = () => { carregar(); recalcular(); };
</script>
</body>
</html>
