<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adega O Fluxo | O Fluxo Não Para</title>
    <style>
        :root {
            --gold: #D4AF37;
            --dark: #0a0a0a;
            --gray: #1a1a1a;
            --text: #f5f5f5;
            --green: #25d366;
            --red: #ff3333;
            --blue: #0084ff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background-color: var(--dark); color: var(--text); padding-bottom: 140px; }
        header { background: linear-gradient(to bottom, #000, var(--gray)); padding: 30px 20px; text-align: center; border-bottom: 2px solid var(--gold); }
        header h1 { color: var(--gold); font-size: 2.2rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; }
        header p { color: #888; font-size: 1rem; }
        .container { max-width: 600px; margin: 0 auto; padding: 15px; }
        .categoria-title { margin: 25px 0 15px; color: var(--gold); border-left: 4px solid var(--gold); padding-left: 10px; font-size: 1.3rem; text-transform: uppercase; }
        .card { background: var(--gray); border-radius: 10px; padding: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #2d2d2d; }
        .card-img { width: 60px; height: 60px; border-radius: 8px; margin-right: 15px; object-fit: contain; background: #fff; padding: 4px; }
        .card-info { flex-grow: 1; }
        .card-info h3 { font-size: 1.05rem; margin-bottom: 5px; color: #fff; }
        .card-info p { color: var(--gold); font-weight: bold; font-size: 1.15rem; }
        .btn-add { background: var(--gold); color: #000; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-add:active { transform: scale(0.95); }
        .cart-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #151515; border-top: 2px solid var(--gold); padding: 20px; display: flex; justify-content: space-between; align-items: center; z-index: 100; gap: 10px; }
        .cart-info-total { color: #fff; flex-grow: 1; }
        .cart-info-total span { color: var(--gold); font-size: 1.3rem; font-weight: bold; display: block; }
        .cart-buttons { display: flex; gap: 8px; }
        .btn-clear { background: var(--red); color: #fff; border: none; padding: 12px 14px; border-radius: 6px; font-weight: bold; font-size: 0.9rem; cursor: pointer; }
        .btn-checkout { background: var(--green); color: #fff; border: none; padding: 12px 20px; border-radius: 6px; font-weight: bold; font-size: 1rem; cursor: pointer; box-shadow: 0 4px 10px rgba(37, 211, 102, 0.3); }
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); z-index: 200; justify-content: center; align-items: center; padding: 15px; }
        .modal-content { background: var(--gray); border: 2px solid var(--gold); border-radius: 12px; width: 100%; max-width: 500px; padding: 20px; max-height: 90vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 15px; }
        .modal-header h2 { color: var(--gold); font-size: 1.4rem; }
        .close-modal { color: var(--red); font-size: 1.8rem; cursor: pointer; background: none; border: none; }
        .form-group { margin-bottom: 15px; }
        .form-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: #ccc; font-size: 0.9rem; }
        .form-group input, .form-group select { width: 100%; padding: 10px; background: #0d0d0d; border: 1px solid #444; border-radius: 6px; color: #fff; font-size: 1rem; }
        .resumo-itens { background: #0d0d0d; padding: 10px; border-radius: 6px; margin-bottom: 15px; border: 1px solid #222; }
        .resumo-linha { display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem; margin-bottom: 8px; color: #aaa; padding-bottom: 4px; border-bottom: 1px dashed #222; }
        .btn-remove-item { background: none; border: none; color: var(--red); cursor: pointer; font-weight: bold; padding: 0 5px; }
        .btn-enviar-wa { width: 100%; background: var(--green); color: #fff; border: none; padding: 14px; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<header>
    <h1>Adega O Fluxo</h1>
    <p>O FLUXO NÃO PARA • Rua André da Silva Pina, 309 - Jd Record</p>
</header>

<div class="container">
    <div id="vitrine">Carregando estoque...</div>
</div>

<div class="cart-bar" id="cart-bar" style="display: none;">
    <div class="cart-info-total">Total do Pedido: <span id="cart-total">R$ 0,00</span></div>
    <div class="cart-buttons">
        <button class="btn-clear" onclick="limparCarrinhoCompleto()">Limpar</button>
        <button class="btn-checkout" onclick="abrirModal()">Fechar Pedido</button>
    </div>
</div>

<div class="modal" id="modal-checkout">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Dados da Entrega</h2>
            <button class="close-modal" onclick="fecharModal()">×</button>
        </div>
        <div class="resumo-itens" id="resumo-itens-checkout"></div>
        <div class="form-group"><label>Seu Nome *</label><input type="text" id="nome-cliente"></div>
        <div class="form-row"><div class="form-group"><label>CEP *</label><input type="text" id="cep-cliente" oninput="buscarCepDoCliente(this.value)"></div></div>
        <div class="form-group"><label>Rua *</label><input type="text" id="rua-cliente" disabled></div>
        <div class="form-group"><label>Número *</label><input type="text" id="num-cliente"></div>
        <button class="btn-enviar-wa" onclick="finalizarPedido()">Confirmar no WhatsApp</button>
    </div>
</div>

<script>
    const whatsappOficial = "5511942971753"; 
    const taxaEntrega = 6.00;
    let baseProdutos = [];
    let carrinho = JSON.parse(localStorage.getItem('carrinho_fluxo')) || [];

    async function carregarProdutosDoGitHub() {
        try {
            // SUBSTITUA O LINK ABAIXO PELO LINK RAW DO SEU produtos.json
            const url = 'COLE_AQUI_O_LINK_RAW_DO_SEU_GITHUB';
            const response = await fetch(url);
            baseProdutos = await response.json();
            inicializarVitrine();
        } catch (error) {
            document.getElementById('vitrine').innerText = "Erro ao carregar cardápio.";
        }
    }

    function inicializarVitrine() {
        const vitrine = document.getElementById('vitrine');
        let html = '';
        let catAtual = '';
        baseProdutos.forEach((item, index) => {
            if (item.cat !== catAtual) {
                html += `<h2 class="categoria-title">${item.cat}</h2>`;
                catAtual = item.cat;
            }
            html += `<div class="card">
                        <img src="${item.img}" class="card-img">
                        <div class="card-info"><h3>${item.nome}</h3><p>R$ ${item.preco.toFixed(2).replace('.', ',')}</p></div>
                        <button class="btn-add" onclick="adicionarAoCarrinho(${index})">ADD</button>
                     </div>`;
        });
        vitrine.innerHTML = html;
    }

    function adicionarAoCarrinho(id) { carrinho.push(baseProdutos[id]); salvarCarrinho(); recalcularTotais(); }
    function salvarCarrinho() { localStorage.setItem('carrinho_fluxo', JSON.stringify(carrinho)); }
    function recalcularTotais() {
        const total = carrinho.reduce((acc, p) => acc + p.preco, 0) + taxaEntrega;
        document.getElementById('cart-total').innerText = `R$ ${total.toFixed(2).replace('.', ',')}`;
        document.getElementById('cart-bar').style.display = carrinho.length > 0 ? 'flex' : 'none';
    }

    function abrirModal() { 
        const res = document.getElementById('resumo-itens-checkout');
        res.innerHTML = carrinho.map((i, idx) => `<div class="resumo-linha"><span>${i.nome}</span><span>R$ ${i.preco.toFixed(2)}</span></div>`).join('');
        document.getElementById('modal-checkout').style.display = 'flex'; 
    }
    
    function fecharModal() { document.getElementById('modal-checkout').style.display = 'none'; }
    
    function finalizarPedido() {
        const nome = document.getElementById('nome-cliente').value;
        let msg = `*NOVO PEDIDO - ADEGA O FLUXO*\n\n`;
        carrinho.forEach(item => { msg += `• ${item.nome}\n`; });
        window.open(`https://api.whatsapp.com/send?phone=${whatsappOficial}&text=${encodeURIComponent(msg)}`, '_blank');
    }

    window.onload = () => { carregarProdutosDoGitHub(); recalcularTotais(); };
</script>
</body>
</html>
