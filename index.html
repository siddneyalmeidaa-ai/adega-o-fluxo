<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adega O Fluxo</title>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: sans-serif; padding-bottom: 160px; }
        .categoria { color: #D4AF37; margin: 25px 10px 10px; border-bottom: 1px solid #333; padding-bottom: 5px; text-transform: uppercase; }
        .card { background: #1a1a1a; margin: 10px; padding: 15px; border-radius: 10px; display: flex; align-items: center; }
        .card img { width: 60px; height: 60px; border-radius: 8px; margin-right: 15px; object-fit: cover; background: #fff; }
        .info { flex-grow: 1; }
        .info h3 { margin: 0; font-size: 1.1rem; }
        .info p { font-size: 0.75rem; color: #aaa; margin: 2px 0; }
        .preco { color: #D4AF37; font-weight: bold; }
        .btn-add { background: #D4AF37; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; }
        .cart-bar { position: fixed; bottom: 0; width: 100%; background: #151515; padding: 20px; display: flex; justify-content: space-between; align-items: center; border-top: 2px solid #D4AF37; }
        #modalPedido { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); padding: 20px; z-index: 200; overflow-y: auto; }
        .modal-content { max-width: 500px; margin: 20px auto; background: #1a1a1a; padding: 20px; border-radius: 10px; }
        .item-lista { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #333; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 5px; border: 1px solid #333; background: #000; color: #fff; }
    </style>
</head>
<body>

<header style="text-align:center; padding:20px;"><h1>Adega O Fluxo</h1></header>
<div id="vitrine">Carregando cardápio...</div>

<div class="cart-bar" id="cart-bar" style="display: none;">
    <div>Total: <span id="cart-total" style="color:#D4AF37; font-size:1.2rem;">R$ 0,00</span></div>
    <button onclick="abrirModal()" style="background:#25d366; border:none; padding:12px 20px; color:white; border-radius:5px; font-weight:bold;">FECHAR PEDIDO</button>
</div>

<div id="modalPedido">
    <div class="modal-content">
        <h2 style="color:#D4AF37; margin-bottom:15px;">Resumo do Pedido</h2>
        <div id="lista-resumo"></div>
        <p style="text-align:right; font-size:1.3rem; margin:15px 0;">Total: <span id="modal-total" style="color:#D4AF37;">R$ 0,00</span></p>
        
        <input type="text" id="nomeCliente" placeholder="Nome Completo">
        <input type="text" id="cep" placeholder="CEP" onblur="buscarCEP(this.value)">
        <input type="text" id="rua" placeholder="Rua">
        <input type="text" id="num" placeholder="Número">
        <input type="text" id="bairro" placeholder="Bairro">
        <input type="text" id="troco" placeholder="Troco para quanto?">
        
        <select id="pagamento">
            <option value="Pix">Pix</option>
            <option value="Cartão">Cartão</option>
            <option value="Dinheiro">Dinheiro</option>
        </select>
        <textarea id="obs" placeholder="Observações"></textarea>
        
        <button onclick="finalizarPedido()" style="width:100%; padding:15px; background:#25d366; border:none; color:white; font-weight:bold;">ENVIAR NO WHATSAPP</button>
        <button onclick="limparTudo()" style="width:100%; padding:10px; margin-top:10px; background:#ff3333; border:none; color:white;">LIMPAR CARRINHO</button>
        <button onclick="fecharModal()" style="width:100%; padding:10px; margin-top:5px; background:transparent; color:white;">VOLTAR</button>
    </div>
</div>

<script>
    let baseProdutos = [];
    let carrinho = JSON.parse(localStorage.getItem('carrinho_fluxo')) || [];

    async function carregar() {
        try {
            const res = await fetch('https://siddneyalmeidaa-ai.github.io/adega-o-fluxo/produtos.json');
            baseProdutos = await res.json();
            let html = '', catAtual = '';
            baseProdutos.forEach((p, i) => {
                if (p.cat !== catAtual) { html += `<h2 class="categoria">${p.cat}</h2>`; catAtual = p.cat; }
                html += `
                    <div class="card">
                        <img src="${p.img}">
                        <div class="info">
                            <h3>${p.nome}</h3>
                            <p>${p.desc || ''}</p>
                            <span class="preco">R$ ${p.preco.toFixed(2)}</span>
                        </div>
                        <button class="btn-add" onclick="adicionar(${i})">ADD</button>
                    </div>`;
            });
            document.getElementById('vitrine').innerHTML = html;
        } catch (e) { document.getElementById('vitrine').innerText = "Erro ao carregar cardápio."; }
    }

    async function buscarCEP(cep) {
        cep = cep.replace(/\D/g, '');
        if(cep.length === 8) {
            const res = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
            const data = await res.json();
            if(!data.erro) { document.getElementById('rua').value = data.logradouro; document.getElementById('bairro').value = data.bairro; }
        }
    }

    function adicionar(i) { carrinho.push(baseProdutos[i]); salvar(); }
    function remover(i) { carrinho.splice(i, 1); salvar(); abrirModal(); }
    function salvar() { localStorage.setItem('carrinho_fluxo', JSON.stringify(carrinho)); recalcular(); }
    function limparTudo() { carrinho = []; salvar(); fecharModal(); }

    function recalcular() {
        const total = carrinho.reduce((a, b) => a + b.preco, 0);
        document.getElementById('cart-total').innerText = `R$ ${total.toFixed(2)}`;
        document.getElementById('modal-total').innerText = `R$ ${total.toFixed(2)}`;
        document.getElementById('cart-bar').style.display = carrinho.length > 0 ? 'flex' : 'none';
    }

    function abrirModal() {
        let html = '';
        carrinho.forEach((p, i) => {
            html += `<div class="item-lista"><span>${p.nome} (R$ ${p.preco.toFixed(2)})</span><button onclick="remover(${i})" style="background:none; border:none; color:red; cursor:pointer;">🗑️</button></div>`;
        });
        document.getElementById('lista-resumo').innerHTML = html;
        document.getElementById('modalPedido').style.display = 'block';
    }

    function fecharModal() { document.getElementById('modalPedido').style.display = 'none'; }

    function finalizarPedido() {
        const total = carrinho.reduce((a, b) => a + b.preco, 0);
        let msg = `*NOVO PEDIDO - ADEGA O FLUXO*\n\n`;
        carrinho.forEach(item => msg += `• ${item.nome} - R$ ${item.preco.toFixed(2)}\n`);
        msg += `\n*TOTAL: R$ ${total.toFixed(2)}*\n\n`;
        msg += `Nome: ${document.getElementById('nomeCliente').value}\n`;
        msg += `End: ${document.getElementById('rua').value}, ${document.getElementById('num').value} - ${document.getElementById('bairro').value}\n`;
        msg += `Pagamento: ${document.getElementById('pagamento').value}\n`;
        msg += `Troco: ${document.getElementById('troco').value || "Não precisa"}\n`;
        msg += `Obs: ${document.getElementById('obs').value}`;
        window.open(`https://api.whatsapp.com/send?phone=5511942971753&text=${encodeURIComponent(msg)}`, '_blank');
    }

    window.onload = () => { carregar(); recalcular(); };
</script>
</body>
            </html>
