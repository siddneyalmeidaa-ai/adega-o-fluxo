<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adega O Fluxo | O Fluxo Não Para</title>
    <style>
        :root { --gold: #D4AF37; --dark: #0a0a0a; --gray: #1a1a1a; --text: #f5f5f5; --green: #25d366; --red: #ff3333; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background-color: var(--dark); color: var(--text); padding-bottom: 140px; }
        header { background: linear-gradient(to bottom, #000, var(--gray)); padding: 30px 20px; text-align: center; border-bottom: 2px solid var(--gold); }
        header h1 { color: var(--gold); font-size: 2.2rem; text-transform: uppercase; letter-spacing: 2px; }
        .container { max-width: 600px; margin: 0 auto; padding: 15px; }
        .categoria-title { margin: 25px 0 15px; color: var(--gold); border-left: 4px solid var(--gold); padding-left: 10px; font-size: 1.3rem; text-transform: uppercase; }
        .card { background: var(--gray); border-radius: 10px; padding: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #2d2d2d; }
        .card-img { width: 60px; height: 60px; border-radius: 8px; margin-right: 15px; object-fit: contain; background: #fff; padding: 4px; }
        .card-info h3 { font-size: 1.05rem; color: #fff; }
        .card-info p { color: var(--gold); font-weight: bold; font-size: 1.15rem; }
        .btn-add { background: var(--gold); color: #000; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .cart-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #151515; border-top: 2px solid var(--gold); padding: 20px; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .btn-checkout { background: var(--green); color: #fff; border: none; padding: 12px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <h1>Adega O Fluxo</h1>
    <p>Rua André da Silva Pina, 309 - Jd Record</p>
</header>

<div class="container"><div id="vitrine">Carregando estoque...</div></div>

<div class="cart-bar" id="cart-bar" style="display: none;">
    <div>Total: <span id="cart-total" style="color:var(--gold); font-weight:bold;">R$ 0,00</span></div>
    <button class="btn-checkout" onclick="abrirModal()">Fechar Pedido</button>
</div>

<script>
    const whatsappOficial = "5511942971753"; 
    let baseProdutos = [];
    let carrinho = JSON.parse(localStorage.getItem('carrinho_fluxo')) || [];

    async function carregarProdutosDoGitHub() {
        try {
            // Este link acessa o seu arquivo JSON como uma página do seu site
            const url = 'https://siddneyalmeidaa-ai.github.io/adega-o-fluxo/json/produtos.json';
            const response = await fetch(url);
            if (!response.ok) throw new Error("Erro de conexão");
            baseProdutos = await response.json();
            inicializarVitrine();
        } catch (error) {
            document.getElementById('vitrine').innerText = "Erro ao carregar cardápio. Verifique se o arquivo está na pasta 'json'.";
        }
    }

    function inicializarVitrine() {
        const vitrine = document.getElementById('vitrine');
        let html = '';
        let catAtual = '';
        baseProdutos.forEach((item, index) => {
            if (item.cat !== catAtual) {
                html += `<h2 class="categoria-title">${item.cat}</h2>`;
                catAtual = item.cat;
            }
            html += `<div class="card">
                        <img src="${item.img}" class="card-img">
                        <div class="card-info"><h3>${item.nome}</h3><p>R$ ${item.preco.toFixed(2).replace('.', ',')}</p></div>
                        <button class="btn-add" onclick="adicionar(${index})">ADD</button>
                     </div>`;
        });
        vitrine.innerHTML = html;
    }

    function adicionar(id) { 
        carrinho.push(baseProdutos[id]); 
        localStorage.setItem('carrinho_fluxo', JSON.stringify(carrinho));
        recalcularTotais(); 
    }

    function recalcularTotais() {
        const total = carrinho.reduce((acc, p) => acc + p.preco, 0) + 6.00;
        document.getElementById('cart-total').innerText = `R$ ${total.toFixed(2).replace('.', ',')}`;
        document.getElementById('cart-bar').style.display = carrinho.length > 0 ? 'flex' : 'none';
    }

    function abrirModal() {
        let msg = `*NOVO PEDIDO - ADEGA O FLUXO*\n\n`;
        carrinho.forEach(item => { msg += `• ${item.nome}\n`; });
        window.open(`https://api.whatsapp.com/send?phone=${whatsappOficial}&text=${encodeURIComponent(msg)}`, '_blank');
    }

    window.onload = () => { carregarProdutosDoGitHub(); recalcularTotais(); };
</script>
</body>
</html>
